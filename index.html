<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --metal: radial-gradient(circle, #ffffff 0%, #bdc3c7 70%, #95a5a6 100%);
            --gold: linear-gradient(180deg, #f1c40f, #d4af37);
        }
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; color: white; }
        .container { background: #2c3e50; width: 320px; padding: 30px; border-radius: 40px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .balance-card { background: #34495e; padding: 10px; border-radius: 20px; color: #f1c40f; font-weight: bold; font-size: 20px; margin-bottom: 20px; }
        .coin-box { height: 200px; display: flex; align-items: flex-end; justify-content: center; perspective: 1000px; margin-bottom: 30px; }
        #coin { width: 120px; height: 120px; position: relative; transform-style: preserve-3d; transition: transform 2s cubic-bezier(0.3, 1, 0.2, 1); }
        @keyframes tossUp { 0% { bottom: 0; } 50% { bottom: 180px; } 100% { bottom: 0; } }
        .tossing { animation: tossUp 2s ease-in-out; }
        .side { position: absolute; width: 100%; height: 100%; border-radius: 50%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; background: var(--metal); border: 4px solid #ecf0f1; }
        .tails { transform: rotateY(180deg); }
        .btn { border: none; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; padding: 15px; }
        .btn-flip { background: var(--gold); color: #331100; font-size: 18px; }
        .btn-kpay { background: white; color: #003399; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="balance-card">Ks <span id="balance">1000</span></div>

    <div class="coin-box">
        <div id="coin">
            <div class="side heads"><span style="font-size: 50px;">👑</span></div>
            <div class="side tails"><span style="font-size: 50px;">☘️</span></div>
        </div>
    </div>

    <p id="status" style="color: #bdc3c7; height: 20px;">ကစားရန် နှိပ်ပါ</p>
    
    <button class="btn btn-flip" id="flipBtn" onclick="flipIt()">FLIP (500 Ks)</button>
    <button class="btn btn-kpay" onclick="topUp()">ငွေဖြည့်မည်</button>
</div>

<script>
    let balance = 1000;
    let totalRot = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // --- အသံဖန်တီးသည့် Logic ---
    function playSound(freq, type, duration, vol) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function playFlipSound() {
        // ဒင်္ဂါးပြားလည်နေစဉ် ထွက်မည့်အသံ (Tick tick tick)
        for(let i=0; i<10; i++) {
            setTimeout(() => playSound(800 + (i*100), 'triangle', 0.1, 0.1), i * 150);
        }
    }

    function playWinSound() {
        playSound(523.25, 'square', 0.3, 0.1); // Do
        setTimeout(() => playSound(659.25, 'square', 0.3, 0.1), 150); // Mi
        setTimeout(() => playSound(783.99, 'square', 0.5, 0.1), 300); // Sol
    }

    function playLoseSound() {
        playSound(300, 'sawtooth', 0.5, 0.1);
        setTimeout(() => playSound(200, 'sawtooth', 0.5, 0.1), 200);
    }

    // --- ဂိမ်း Logic ---
    function flipIt() {
        if (balance < 500) return alert("ပိုက်ဆံကုန်ပြီ!");
        
        balance -= 500;
        document.getElementById('balance').innerText = balance;
        
        const coin = document.getElementById('coin');
        const status = document.getElementById('status');
        
        // အသံစဖွင့်
        playFlipSound();
        
        coin.classList.remove('tossing');
        void coin.offsetWidth;
        coin.classList.add('tossing');

        const isHeads = Math.random() < 0.5;
        totalRot += 1800 + (isHeads ? 0 : 180);
        coin.style.transform = `rotateY(${totalRot}deg)`;

        setTimeout(() => {
            if (isHeads) {
                balance += 1000;
                status.innerHTML = "<b style='color:#2ecc71'>WINNER!</b>";
                playWinSound();
            } else {
                status.innerHTML = "<b style='color:#e74c3c'>LOSER!</b>";
                playLoseSound();
            }
            document.getElementById('balance').innerText = balance;
        }, 2000);
    }

    function topUp() {
        balance += 5000;
        document.getElementById('balance').innerText = balance;
        playSound(1000, 'sine', 0.2, 0.1); // ငွေဖြည့်သံ
        alert("၅၀၀၀ ကျပ် ဖြည့်ပြီးပါပြီ");
    }
</script>
</body>
</html>
